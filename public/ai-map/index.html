<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI地图助手 - 小付同学专门为你创造的AI助手" />
    <meta name="theme-color" content="#3b82f6" />
    <link rel="manifest" href="/ai-map/manifest.json" />
    <title>AI 地图助手</title>
    <script type="module" crossorigin src="/ai-map/assets/index-BDdAL4PN.js"></script>
    <link rel="stylesheet" crossorigin href="/ai-map/assets/index-CpzxC1Fo.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
