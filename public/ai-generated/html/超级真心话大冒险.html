<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级真心话大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        h1 {
            text-align: center;
            color: #e91e63;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }
        
        .mode-tabs {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 25px;
        }
        
        .mode-tab {
            padding: 12px 20px;
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #777;
            position: relative;
            transition: all 0.3s;
        }
        
        .mode-tab.active {
            color: #e91e63;
            font-weight: bold;
        }
        
        .mode-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #e91e63;
        }
        
        .game-section {
            display: none;
        }
        
        .game-section.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .option-btn {
            padding: 8px 18px;
            border: 2px solid #e91e63;
            border-radius: 30px;
            background: white;
            color: #e91e63;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .option-btn.active {
            background: #e91e63;
            color: white;
        }
        
        .question-box {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            margin: 25px 0;
            border-radius: 15px;
            background: #fff0f3;
            font-size: 1.3rem;
            line-height: 1.8;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .question-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e91e63' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.7;
        }
        
        .question-content {
            position: relative;
            z-index: 1;
        }
        
        .action-btn {
            display: block;
            margin: 0 auto;
            padding: 15px 40px;
            background: #e91e63;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3);
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(233, 30, 99, 0.4);
        }
        
        /* 比大小模式样式 */
        .dice-players {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 25px 0;
            justify-content: center;
        }
        
        .player {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f8f8f8;
            width: 120px;
        }
        
        .player-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
        }
        
        .dice {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border: 2px solid #eee;
            color: #e91e63;
        }
        
        .dice-result {
            margin: 20px 0;
            text-align: center;
            font-size: 1.3rem;
            color: #e91e63;
            font-weight: bold;
        }
        
        .player-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .question-box {
                min-height: 160px;
                padding: 20px 15px;
                font-size: 1.1rem;
            }
            
            .action-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>超级真心话大冒险</h1>
        
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="truth-dare">真心话大冒险</button>
            <button class="mode-tab" data-mode="dice">比大小模式</button>
        </div>
        
        <!-- 真心话大冒险模式 -->
        <div class="game-section active" id="truth-dare-section">
            <div class="options">
                <button class="option-btn active" data-type="truth">真心话</button>
                <button class="option-btn" data-type="dare">大冒险</button>
            </div>
            
            <div class="options">
                <button class="option-btn active" data-difficulty="easy">简单</button>
                <button class="option-btn" data-difficulty="medium">中等</button>
                <button class="option-btn" data-difficulty="hard">困难</button>
            </div>
            
            <div class="question-box">
                <div class="question-content">
                    选择类型和难度，点击下方按钮开始吧！
                </div>
            </div>
            
            <button class="action-btn" id="draw-question">抽取题目</button>
        </div>
        
        <!-- 比大小模式 -->
        <div class="game-section" id="dice-section">
            <div class="player-controls">
                <button class="action-btn" id="add-player" style="padding: 8px 15px; font-size: 1rem;">添加玩家</button>
                <button class="action-btn" id="roll-dice" style="padding: 8px 15px; font-size: 1rem;">开始比大小</button>
            </div>
            
            <div class="dice-players" id="players-container">
                <div class="player">
                    <div class="player-name">玩家1</div>
                    <div class="dice">?</div>
                </div>
                <div class="player">
                    <div class="player-name">玩家2</div>
                    <div class="dice">?</div>
                </div>
            </div>
            
            <div class="dice-result" id="dice-result">
                点击"开始比大小"按钮进行游戏
            </div>
            
            <div class="question-box">
                <div class="question-content" id="dice-punishment">
                    点数最小的玩家将接受惩罚
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模式切换
        const modeTabs = document.querySelectorAll('.mode-tab');
        const gameSections = document.querySelectorAll('.game-section');
        
        modeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 移除所有active类
                modeTabs.forEach(t => t.classList.remove('active'));
                gameSections.forEach(s => s.classList.remove('active'));
                
                // 添加当前active类
                tab.classList.add('active');
                const mode = tab.getAttribute('data-mode');
                document.getElementById(`${mode}-section`).classList.add('active');
            });
        });
        
        // 真心话大冒险设置
        const typeBtns = document.querySelectorAll('[data-type]');
        const difficultyBtns = document.querySelectorAll('[data-difficulty]');
        const questionBox = document.querySelector('.question-content');
        const drawBtn = document.getElementById('draw-question');
        
        let currentType = 'truth';
        let currentDifficulty = 'easy';
        
        // 切换类型
        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.getAttribute('data-type');
            });
        });
        
        // 切换难度
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.getAttribute('data-difficulty');

        // 抽取题目
        drawBtn.addEventListener('click', () => {
            let questions = currentType === 'truth' ? truthQuestions : dareQuestions;
            let selectedQuestions = questions[currentDifficulty];
            
            // 随机选择题目
            const randomIndex = Math.floor(Math.random() * selectedQuestions.length);
            const selectedQuestion = selectedQuestions[randomIndex];
            
            // 添加动画效果
            questionBox.style.opacity = '0';
            setTimeout(() => {
                questionBox.textContent = selectedQuestion;
                questionBox.style.opacity = '1';
            }, 300);
        });
        
        // 比大小模式
        const addPlayerBtn = document.getElementById('add-player');
        const rollDiceBtn = document.getElementById('roll-dice');
        const playersContainer = document.getElementById('players-container');
        const diceResult = document.getElementById('dice-result');
        const dicePunishment = document.querySelector('#dice-punishment');
        
        let playerCount = 2;
        
        // 添加玩家
        addPlayerBtn.addEventListener('click', () => {
            if (playerCount < 8) { // 最多8个玩家
                playerCount++;
                const playerDiv = document.createElement('div');
                playerDiv.className = 'player';
                playerDiv.innerHTML = `
                    <div class="player-name">玩家${playerCount}</div>
                    <div class="dice">?</div>
                `;
                playersContainer.appendChild(playerDiv);
            }
        });
        
        // 摇骰子比大小
        rollDiceBtn.addEventListener('click', () => {
            const dices = document.querySelectorAll('.dice');
            const results = [];
            
            // 先显示随机滚动效果
            dices.forEach((dice, index) => {
                let rollCount = 0;
                const rollInterval = setInterval(() => {
                    const randomNum = Math.floor(Math.random() * 6) + 1;
                    dice.textContent = randomNum;
                    rollCount++;
                    
                    if (rollCount > 10) {
                        clearInterval(rollInterval);
                        // 最终结果
                        const finalNum = Math.floor(Math.random() * 6) + 1;
                        dice.textContent = finalNum;
                        results.push({
                            index: index,
                            value: finalNum
                        });
                        
                        // 所有骰子都完成后判断结果
                        if (results.length === dices.length) {
                            determineWinner(results);
                        }
                    }
                }, 100);
            });
        });
        
        // 决定赢家和输家
        function determineWinner(results) {
            // 排序找出最大和最小值
            results.sort((a, b) => a.value - b.value);
            const minVal = results[0].value;
            const maxVal = results[results.length - 1].value;
            
            // 找出所有最小值和最大值的玩家
            const losers = results.filter(r => r.value === minVal);
            const winners = results.filter(r => r.value === maxVal);
            
            // 显示结果
            let resultText = '';
            if (losers.length === 1) {
                resultText = `玩家${losers[0].index + 1}点数最小（${minVal}点），接受惩罚！`;
            } else {
                const loserNames = losers.map(l => `玩家${l.index + 1}`).join('和');
                resultText = `${loserNames}点数相同且最小（${minVal}点），一起接受惩罚！`;
            }
            
            diceResult.textContent = resultText;
            
            // 生成惩罚
            generatePunishment();
        }
        
        // 生成惩罚（随机从大冒险题库中选一个）
        function generatePunishment() {
            const allDares = [
                ...dareQuestions.easy,
                ...dareQuestions.medium,
                ...dareQuestions.hard
            ];
            const randomIndex = Math.floor(Math.random() * allDares.length);
            dicePunishment.textContent = allDares[randomIndex];
        }
    </script>
</body>
</html>
